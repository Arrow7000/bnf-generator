# Render.com Infrastructure-as-Code for the BnfGen grammar-generation API.
# The static frontend stays on GitHub Pages; this service is a thin proxy that
# holds the Fireworks key, compiles EBNF -> GBNF, and calls Fireworks grammar
# mode. See README for setup.
services:
  - type: web
    name: bnfgen-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # bump to "starter" ($7/mo) to avoid cold starts
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Set this in the Render dashboard (Environment -> Secret). Never commit it.
      - key: FIREWORKS_API_KEY
        sync: false
      # Must be a NON-reasoning model that is deployed on serverless: reasoning
      # models (gpt-oss, deepseek-v4, glm) leak their analysis channel through
      # grammar mode and produce garbage on permissive grammars. Kimi K2.6 is
      # non-reasoning and produces clean, realistic samples. Check the live
      # catalog with GET /v1/models.
      - key: FIREWORKS_MODEL
        value: accounts/fireworks/models/kimi-k2p6
      # The GitHub Pages origin allowed to call this API (no trailing slash).
      - key: ALLOWED_ORIGINS
        value: https://arrow7000.github.io
